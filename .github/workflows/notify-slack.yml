name: Notify Slack on Update

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.claude-plugin/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate changelog summary
        id: changelog
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- plugins/ | head -20)
          CHANGED_PLUGINS=$(echo "$CHANGED_FILES" | grep -oP 'plugins/\K[^/]+' | sort -u | tr '\n' ', ' | sed 's/,$//')

          {
            echo "commit_msg=$COMMIT_MSG"
            echo "changed_plugins=$CHANGED_PLUGINS"
          } >> "$GITHUB_OUTPUT"

          # Build the summary
          SUMMARY="*Marketplace Updated*\n"
          SUMMARY+="Commit: ${COMMIT_MSG}\n"
          SUMMARY+="Plugins changed: ${CHANGED_PLUGINS}\n\n"
          SUMMARY+="Run \`claude-marketplace\` to update."

          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.changelog.outputs.summary }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Claude Code Marketplace Updated"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Commit:* ${{ steps.changelog.outputs.commit_msg }}\n*Plugins changed:* ${{ steps.changelog.outputs.changed_plugins }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Run `claude-marketplace` to update your local plugins."
                  }
                }
              ]
            }
